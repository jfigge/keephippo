# golangci-lint v2 configuration. See https://golangci-lint.run
version: "2"

linters:
  # "standard" = errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - misspell
  settings:
    errcheck:
      # Writes to stdout/stderr in CLI output are conventionally unchecked.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofumpt
