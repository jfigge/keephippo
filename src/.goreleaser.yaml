# GoReleaser configuration. Validate with `goreleaser check`.
# https://goreleaser.com
version: 2

project_name: keephippo

# Artifacts land in the repo-root dist/ (this config runs from src/).
dist: ../dist

before:
  hooks:
    - go mod tidy

builds:
  - id: keephippo
    main: ./cmd/keephippo
    binary: keephippo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/jfigge/keephippo/internal/version.Version={{ .Version }}
      - -X github.com/jfigge/keephippo/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/jfigge/keephippo/internal/version.Branch={{ .Branch }}
      - -X github.com/jfigge/keephippo/internal/version.BuildTime={{ .Date }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

# Code-sign the macOS binaries with the shared Developer ID cert via GoReleaser's
# built-in quill signer — runs on the Linux release runner, no macOS runner or
# local keychain needed. Enabled only when the signing secrets are present, so
# PR / snapshot / local builds stay unsigned and green. Notarization is a drop-in
# addition once the App Store Connect Issuer ID is known: set the
# MACOS_NOTARY_ISSUER_ID secret and uncomment the notarize block below (the key
# and key_id secrets are already configured).
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids: [keephippo]
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      # notarize:
      #   issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
      #   key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
      #   key: "{{ .Env.MACOS_NOTARY_KEY }}"
      #   wait: true
      #   timeout: 20m

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc

release:
  github:
    owner: jfigge
    name: keephippo
  draft: false
  prerelease: auto

# Publish a Homebrew cask to jfigge/homebrew-tap (installable via
# `brew install jfigge/tap/keephippo`). Casks are macOS-only. The cask is
# generated every build but only pushed when HOMEBREW_TAP_TOKEN is set (a PAT
# with contents:write on the tap repo) — empty on PR/snapshot/local runs, so
# those skip the upload and still succeed. `index .Env` yields "" for an unset
# var without erroring.
homebrew_casks:
  - name: keephippo
    binaries:
      - keephippo
    repository:
      owner: jfigge
      name: homebrew-tap
      branch: main
      token: '{{ index .Env "HOMEBREW_TAP_TOKEN" }}'
    skip_upload: '{{ if eq (index .Env "HOMEBREW_TAP_TOKEN") "" }}true{{ else }}false{{ end }}'
    directory: Casks
    homepage: "https://keephippo.com/"
    description: "Vault-compatible secrets manager — server + console (CLI)"
    url:
      template: "https://github.com/jfigge/keephippo/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/jfigge/keephippo/"
    commit_author:
      name: goreleaser-bot
      email: 41898282+github-actions[bot]@users.noreply.github.com
    # Signed but not yet notarized: strip the quarantine bit so Gatekeeper won't
    # block a browser-downloaded install. Remove once notarization is enabled.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/keephippo"]
          end

# Build and publish a multi-arch container image to the GitHub Container Registry
# (ghcr.io/jfigge/keephippo). GoReleaser drives a single `docker buildx` pass
# that compiles linux/amd64 + linux/arm64 into one manifest list, so
# `docker pull ghcr.io/jfigge/keephippo:<version>` resolves the caller's arch.
# It runs only on `goreleaser release` (not `build` / `--snapshot`), so
# `make dist` and local builds never need Docker. The Release workflow sets up
# QEMU + buildx and logs in to ghcr before this runs; the first push creates the
# package *private* — make it public once in the repo's package settings for
# anonymous `docker pull` to work.
dockers_v2:
  - id: keephippo
    ids: [keephippo]
    dockerfile: ../Dockerfile # goreleaser runs from src/; Dockerfile is at repo root
    flags:
      - "--pull" # always refresh the distroless base
    images:
      - ghcr.io/jfigge/keephippo
    tags:
      - "{{ .Version }}"
      # Skip moving :latest for prereleases (matches release.prerelease: auto);
      # the empty tag is ignored, so :latest stays on the last stable release.
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "Vault-compatible secrets manager — server + console (CLI)"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "https://github.com/jfigge/keephippo"
      org.opencontainers.image.url: "https://keephippo.com/"
      org.opencontainers.image.licenses: "MPL-2.0"

# Publish a Scoop manifest to jfigge/scoop-bucket so Windows users can
# `scoop bucket add jfigge https://github.com/jfigge/scoop-bucket` and then
# `scoop install keephippo`. The manifest points at the release's windows zip
# archives (amd64 + arm64). Like the Homebrew cask, it is generated every build
# but only pushed when SCOOP_BUCKET_TOKEN is set (a PAT with contents:write on
# the bucket repo) — empty on PR/snapshot/local runs, so those skip the upload
# and still succeed.
scoops:
  - name: keephippo
    repository:
      owner: jfigge
      name: scoop-bucket
      branch: main
      token: '{{ index .Env "SCOOP_BUCKET_TOKEN" }}'
    directory: bucket
    homepage: "https://keephippo.com/"
    description: "Vault-compatible secrets manager — server + console (CLI)"
    license: MPL-2.0
    skip_upload: '{{ if eq (index .Env "SCOOP_BUCKET_TOKEN") "" }}true{{ else }}false{{ end }}'
    commit_author:
      name: goreleaser-bot
      email: 41898282+github-actions[bot]@users.noreply.github.com
