name: Release

# Cut by `make release VERSION=x.y.z` (scripts/release.sh), which pushes a
# vX.Y.Z tag. This builds the cross-platform binaries via GoReleaser
# (src/.goreleaser.yaml), publishes the GitHub Release with the archives +
# checksums, then dispatches the Deploy site workflow so the Downloads page
# (website/versions.json) picks up the new release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # dispatch the deploy-site workflow after publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      # Runs from src/ so it finds .goreleaser.yaml there; artifacts land in dist/.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh Downloads page (versions.json tracks the new release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-site.yml --ref main
