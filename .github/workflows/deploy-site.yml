name: Deploy site

# Builds website/ (with generated versions.json + hosted docs) and publishes it
# to GitHub Pages. No `paths:` filter (squash-merges can skip path-filtered runs)
# and no `release:` trigger (the default GITHUB_TOKEN won't start one) — the
# release workflow dispatches this after publishing so downloads stay current.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install site build deps
        run: npm install

      - name: Generate versions.json (latest GitHub Release)
        run: node scripts/build-versions.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate hosted user guide
        run: node scripts/build-docs.mjs

      # Pages must be enabled once in the repo (Settings -> Pages -> Source:
      # "GitHub Actions"). The default GITHUB_TOKEN cannot create the Pages site
      # via the API, so `enablement: true` is intentionally NOT set here — this
      # step only reads the existing Pages configuration.
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
