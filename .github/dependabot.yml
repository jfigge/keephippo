version: 2
updates:
  - package-ecosystem: gomod
    directory: "/src"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    # Bundle all action bumps into one PR so multi-path actions that must share
    # a version (e.g. github/codeql-action/init + analyze) never split across
    # separate PRs and land on mismatched versions.
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      # actions/deploy-pages v5, upload-pages-artifact v5, and configure-pages v6
      # reproducibly fail this repo's Pages deploy with "deployment_failed" (the
      # v4/v3/v5 set deploys cleanly). Hold the working majors until the newer
      # line is verified against this Pages/custom-domain setup.
      - dependency-name: "actions/deploy-pages"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-pages-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/configure-pages"
        update-types: ["version-update:semver-major"]
